<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: Lake Erie sunset gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (iOS auto-rounds, but this also helps elsewhere) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Sun -->
  <circle cx="256" cy="190" r="58" fill="#fde68a" opacity="0.95"/>

  <!-- Cleveland skyline silhouette (stylized: Terminal Tower in center, Key Tower on right, smaller buildings) -->
  <g fill="#0f172a">
    <!-- Left buildings -->
    <rect x="40"  y="290" width="38" height="120"/>
    <rect x="84"  y="260" width="32" height="150"/>
    <rect x="122" y="280" width="28" height="130"/>
    <rect x="156" y="240" width="40" height="170"/>

    <!-- Terminal Tower (center) - tall with stepped top -->
    <rect x="210" y="170" width="46" height="240"/>
    <rect x="218" y="150" width="30" height="22"/>
    <rect x="225" y="130" width="16" height="22"/>
    <polygon points="233,108 224,130 242,130"/>

    <!-- Key Tower (right) - taller, sleek with pyramid top -->
    <rect x="278" y="140" width="40" height="270"/>
    <polygon points="298,100 278,140 318,140"/>

    <!-- Right buildings -->
    <rect x="332" y="240" width="36" height="170"/>
    <rect x="374" y="270" width="30" height="140"/>
    <rect x="410" y="250" width="34" height="160"/>
    <rect x="450" y="285" width="22" height="125"/>
  </g>

  <!-- Window highlights on Terminal & Key for that nighttime city look -->
  <g fill="#fbbf24" opacity="0.9">
    <rect x="217" y="200" width="4" height="4"/>
    <rect x="225" y="200" width="4" height="4"/>
    <rect x="233" y="200" width="4" height="4"/>
    <rect x="241" y="200" width="4" height="4"/>
    <rect x="217" y="220" width="4" height="4"/>
    <rect x="233" y="220" width="4" height="4"/>
    <rect x="241" y="220" width="4" height="4"/>
    <rect x="217" y="260" width="4" height="4"/>
    <rect x="225" y="260" width="4" height="4"/>
    <rect x="241" y="260" width="4" height="4"/>

    <rect x="284" y="180" width="4" height="4"/>
    <rect x="292" y="180" width="4" height="4"/>
    <rect x="300" y="180" width="4" height="4"/>
    <rect x="308" y="180" width="4" height="4"/>
    <rect x="284" y="210" width="4" height="4"/>
    <rect x="300" y="210" width="4" height="4"/>
    <rect x="308" y="210" width="4" height="4"/>
    <rect x="284" y="250" width="4" height="4"/>
    <rect x="292" y="250" width="4" height="4"/>
    <rect x="308" y="250" width="4" height="4"/>
  </g>

  <!-- Lake Erie waves -->
  <path d="M 0 410 Q 64 395 128 410 T 256 410 T 384 410 T 512 410 L 512 470 Q 384 460 256 470 T 0 470 Z" fill="url(#lake)"/>
  <path d="M 0 440 Q 64 425 128 440 T 256 440 T 384 440 T 512 440 L 512 512 L 0 512 Z" fill="#0c4a6e"/>

  <!-- Subtle wave highlights -->
  <path d="M 30 425 Q 60 420 90 425" stroke="#7dd3fc" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 200 425 Q 230 420 260 425" stroke="#7dd3fc" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 380 425 Q 410 420 440 425" stroke="#7dd3fc" stroke-width="2" fill="none" opacity="0.7"/>
</svg>
